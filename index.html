<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 검색 빈도 조회</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #f8fafc; padding: 16px; display: flex; justify-content: center; }
        main { width: 100%; max-width: 420px; background-color: #ffffff; padding: 24px 20px; border-radius: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: bold; color: #0f172a; }
        .sub-title { font-size: 13px; color: #64748b; margin-top: 6px; }
        
        .welcome-box { background-color: #f0f9ff; border: 1px dashed #bae6fd; border-radius: 16px; padding: 14px; margin-bottom: 24px; text-align: center; }
        .welcome-title { font-size: 13px; font-weight: bold; color: #0369a1; margin-bottom: 4px; }
        .welcome-desc { font-size: 11px; color: #0c4a6e; }
        
        .section { margin-bottom: 20px; }
        .label { font-size: 14px; font-weight: bold; color: #334155; display: block; margin-bottom: 8px; }
        input[type="text"] { width: 100%; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 14px; font-size: 14px; outline: none; background-color: #f8fafc; }
        
        .period-container { display: flex; gap: 6px; width: 100%; }
        .period-btn { flex: 1; padding: 12px 0; border: 1.5px solid #e2e8f0; border-radius: 14px; font-size: 11px; font-weight: bold; cursor: pointer; background-color: #ffffff; color: #64748b; text-align: center; }
        .period-btn.active { background-color: #0ea5e9 !important; border-color: #0ea5e9 !important; color: #ffffff !important; }
        
        .submit-btn { width: 100%; background-color: #0f172a; color: #ffffff; border: none; border-radius: 14px; padding: 16px 0; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; display: block; text-align: center; }
        .submit-btn:active { background-color: #1e293b; }
        
        #resultSection { display: none; margin-top: 24px; padding-top: 20px; border-top: 2px dashed #e2e8f0; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .result-title { font-size: 15px; font-weight: bold; color: #0f172a; }
        .result-info { font-size: 10px; color: #94a3b8; text-align: right; }
        .result-card { background-color: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .card-keyword { font-size: 15px; font-weight: bold; color: #166534; }
        .score-text { font-size: 20px; font-weight: 800; color: #166534; }
        .unit { font-size: 12px; color: #166534; margin-left: 2px; }
    </style>
</head>
<body>
    <main>
        <header>
            <h1>📊 네이버 단어 검색 빈도 조회</h1>
            <div class="sub-title">✏️ 입력한 단어가 네이버에서 얼마나 자주 사용되었는지 비교해 보아요!</div>
        </header>

        <div class="welcome-box">
            <div class="welcome-title">💡 사용 방법 가이드</div>
            <div class="welcome-desc">조회할 단어들을 쉼표(,)로 구분해서 적고<br>기간을 선택한 뒤 아래 버튼을 누르면 실시간 점수가 짜잔! 나와요.</div>
        </div>

        <div class="section">
            <label class="label">🔍 조회할 단어 입력</label>
            <input id="keywordInput" type="text" value="" placeholder="예시: 짜장면, 자장면">
        </div>

        <div class="section">
            <label class="label">📅 조회 기간 선택</label>
            <div class="period-container">
                <button type="button" id="btn-1m" class="period-btn active" onclick="changePeriod('1m')">최근 1달</button>
                <button type="button" id="btn-1y" class="period-btn" onclick="changePeriod('1y')">최근 1년</button>
                <button type="button" id="btn-5y" class="period-btn" onclick="changePeriod('5y')">최근 5년</button>
                <button type="button" id="btn-10y" class="period-btn" onclick="changePeriod('10y')">최근 10년</button>
            </div>
        </div>

        <button type="button" class="submit-btn" id="submitBtn">🚀 실시간 빈도 조회하기</button>

        <div id="resultSection">
            <div class="result-header">
                <div class="result-title">✨ 조회 결과 (<span id="selectedPeriodText" style="color: #0ea5e9;">최근 1달</span>)</div>
                <div class="result-info">
                    *네이버 데이터랩 평균 지수<br>
                    <span style="font-size: 9px; color: #94a3af;">(가장 많이 검색된 단어를 100으로 잡은 비율 점수)</span>
                </div>
            </div>
            <div id="resultContainer"></div>
        </div>
    </main>

    <script>
        let currentPeriod = '1m';
        const periodLabels = { '1m': '📅 최근 1달', '1y': '🗓️ 최근 1년', '5y': '📜 최근 5년', '10y': '⏳ 최근 10년' };

        function changePeriod(period) {
            currentPeriod = period;
            document.getElementById('btn-1m').classList.remove('active');
            document.getElementById('btn-1y').classList.remove('active');
            document.getElementById('btn-5y').classList.remove('active');
            document.getElementById('btn-10y').classList.remove('active');
            document.getElementById('btn-' + period).classList.add('active');
        }

        function getDates(period) {
            const end = new Date();
            const start = new Date();
            
            if (period === '1m') start.setMonth(start.getMonth() - 1);
            else if (period === '1y') start.setFullYear(start.getFullYear() - 1);
            else if (period === '5y') start.setFullYear(start.getFullYear() - 5);
            else if (period === '10y') start.setFullYear(start.getFullYear() - 10);
            
            const formatDate = (d) => d.toISOString().split('T')[0];
            return { startDate: formatDate(start), endDate: formatDate(end) };
        }

        document.getElementById('submitBtn').addEventListener('click', async function() {
            const inputVal = document.getElementById('keywordInput').value;
            const keywords = inputVal.split(',').map(k => k.trim()).filter(k => k !== '');
            
            if (keywords.length === 0) {
                alert('⚠️ 조회할 단어를 입력해 주세요! (예시: 짜장면, 자장면)');
                return;
            }

            document.getElementById('selectedPeriodText').innerText = "조회 중...";
            const container = document.getElementById('resultContainer');
            container.innerHTML = '<div style="text-align:center; font-size:13px; color:#64748b; padding:20px 0;">⏳ 실시간 데이터를 열심히 조회하고 있어요...</div>';
            document.getElementById('resultSection').style.display = 'block';

            const { startDate, endDate } = getDates(currentPeriod);

            const requestBody = {
                startDate: startDate,
                endDate: endDate,
                timeUnit: "month",
                keywordGroups: keywords.map(k => ({ groupName: k, keywords: [k] }))
            };

            try {
                // 💡 코드 내부에 비밀키를 안전하게 직접 탑재했습니다!
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Naver-Client-Id': 'bl4BsuQ9WzOqyCOdKze3',
                        'X-Naver-Client-Secret': 'B3ycDvLMRi'
                    },
                    body: JSON.stringify(requestBody)
                });
                
                const resData = await response.json();
                container.innerHTML = '';
                document.getElementById('selectedPeriodText').innerText = periodLabels[currentPeriod];

                resData.results.forEach(result => {
                    const word = result.title;
                    let total = 0;
                    let count = result.data.length;
                    
                    result.data.forEach(item => { total += item.ratio; });
                    const avgScore = count > 0 ? (total / count).toFixed(1) : 0;

                    const card = document.createElement('div');
                    card.className = "result-card";
                    card.innerHTML = `<div class="card-keyword">🌱 ${word}</div><div><span class="score-text">${avgScore}</span><span class="unit">점</span></div>`;
                    container.appendChild(card);
                });

            } catch (error) {
                alert('❌ 데이터를 가져오지 못했습니다. API 키 설정이나 파일 구성을 확인해 주세요.');
                container.innerHTML = '';
            }
        });
    </script>
</body>
</html>
